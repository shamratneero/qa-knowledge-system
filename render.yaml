services:
  - type: web
    name: qa-knowledge-system
    runtime: docker
    autoDeploy: true
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        sync: false # set manually in the Render dashboard; do not commit a real value here
