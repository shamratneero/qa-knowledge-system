services:
  api:
    build: .
    container_name: qa-knowledge-api
    ports:
      - "8000:8000"
    volumes:
      - qa_data:/app/data
    environment:
      APP_NAME: "AI Conversation Intelligence Platform"
      APP_DESCRIPTION: "Production FastAPI analytics and knowledge intelligence service"
      LOG_LEVEL: "INFO"
      LOG_JSON: "true"
      HOST: "0.0.0.0"
      PORT: "8000"
      MAX_UPLOAD_SIZE_MB: "25"
      DEFAULT_PAGE_SIZE: "100"
      MAX_PAGE_SIZE: "500"
      UVICORN_WORKERS: "2"
      # Required: a stable signing key for auth sessions. Without it the app
      # generates a random one on every restart, invalidating all logins.
      # Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in your shell/secrets manager before running docker compose up}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  qa_data:
